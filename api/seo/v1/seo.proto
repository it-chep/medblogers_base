syntax = "proto3";

package seo.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "api/seo/v1";

service Seo {
  rpc GetDoctorSeoData(GetDoctorSeoDataRequest) returns (GetDoctorSeoDataResponse) {
    option (google.api.http) = {get: "/api/v1/seo/{doctor_slug}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Получение SEO информации для карточки врача"};
  }
  rpc GetFreelancersSeoData(GetFreelancersSeoDataRequest) returns (GetFreelancersSeoDataResponse) {
    option (google.api.http) = {get: "/api/v1/freelancers/seo/{freelancers_slug}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Получение SEO информации для карточки специалиста"};
  }
  rpc GetSitemapInfo(GetSitemapInfoRequest) returns (GetSitemapInfoResponse) {
    option (google.api.http) = {get: "/api/v1/seo/sitemap_info"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Получение урлов для генерации sitemap"};
  }
  rpc GetBrandSeoData(GetBrandSeoDataRequest) returns (GetBrandSeoDataResponse) {
    option (google.api.http) = {get: "/api/v1/brand/seo/{brand_slug}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Получение SEO информации для карточки бренда"};
  }
  rpc GetPromoOfferSeoData(GetPromoOfferSeoDataRequest) returns (GetPromoOfferSeoDataResponse) {
    option (google.api.http) = {get: "/api/v1/promo_offer/seo/{offer_id}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Получение SEO информации для карточки оффера"};
  }
  rpc GetBreadcrumbs(GetBreadcrumbsRequest) returns (GetBreadcrumbsResponse) {
    option (google.api.http) = {
      post: "/api/v1/breadcrumbs",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Получение хлебных крошек"};
  }
}

message GetDoctorSeoDataRequest {
  string doctor_slug = 1;
}

message GetDoctorSeoDataResponse {
  string title = 1;
  string description = 2;
  string image = 3;
}

message GetFreelancersSeoDataRequest {
  string freelancers_slug = 1;
}

message GetFreelancersSeoDataResponse {
  string title = 1;
  string description = 2;
  string image = 3;
}

message GetSitemapInfoRequest {}

message GetSitemapInfoResponse {
  repeated SitemapItem items = 1;

  message SitemapItem {
    string url = 1;
    string last_updated = 2;
    string change_freq = 3;
    string priority = 4;
  }
}

message GetBrandSeoDataRequest{
  string brand_slug = 1;
}

message GetBrandSeoDataResponse{
  string title = 1;
  string description = 2;
  string image = 3;
}

message GetPromoOfferSeoDataRequest{
  string offer_id = 1;
}

message GetPromoOfferSeoDataResponse{
  string title = 1;
  string description = 2;
  string image = 3;
}

message GetBreadcrumbsRequest {
  string path = 1;
}

message GetBreadcrumbsResponse {
  repeated Breadcrumb breadcrumbs = 1;

  message Breadcrumb {
    string name = 1;
    string path = 2;
  }
}