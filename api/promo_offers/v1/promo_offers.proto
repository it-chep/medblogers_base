syntax = "proto3";

package promo_offers.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "api/promo_offers/v1";

service PromoOffersService {
  rpc GetFilterSettings(GetFilterSettingsRequest) returns (GetFilterSettingsResponse) {
    option (google.api.http) = {
      post: "/api/v1/promo_offers/filter/settings"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Доступные фильтры по промо-офферам"};
  }

  rpc FilterOffers(FilterOffersRequest) returns (FilterOffersResponse) {
    option (google.api.http) = {
      post: "/api/v1/promo_offers/filter"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Фильтрация промо-офферов"};
  }

  rpc FilterBrands(FilterBrandsRequest) returns (FilterBrandsResponse) {
    option (google.api.http) = {
      post: "/api/v1/promo_offers/brands/filter"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Фильтрация брендов"};
  }

  rpc GetBrandCard(GetBrandCardRequest) returns (GetBrandCardResponse) {
    option (google.api.http) = {get: "/api/v1/promo_offers/brand/{brand_slug}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Карточка бренда"};
  }

  rpc GetBrandOffers(GetBrandOffersRequest) returns (GetBrandOffersResponse) {
    option (google.api.http) = {get: "/api/v1/promo_offers/brand/{brand_slug}/offers"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Офферы конкретного бренда"};
  }

  rpc GetOfferCard(GetOfferCardRequest) returns (GetOfferCardResponse) {
    option (google.api.http) = {get: "/api/v1/promo_offers/offer/{offer_id}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {summary: "Карточка оффера"};
  }
}

message NamedItem {
  int64 id = 1;
  string name = 2;
}

message SocialNetworkItem {
  int64 id = 1;
  string name = 2;
  string slug = 3;
}

message BrandSocialNetworkItem {
  int64 id = 1;
  string name = 2;
  string slug = 3;
  string link = 4;
}

message BrandPreview {
  int64 id = 1;
  string title = 2;
  string slug = 3;
  string photo = 4;
}

message BrandItem {
  int64 id = 1;
  string title = 2;
  string slug = 3;
  string photo = 4;
  NamedItem topic = 5;
  string website = 6;
  string description = 7;
  repeated BrandSocialNetworkItem social_networks = 8;
}

message OfferItem {
  string id = 1;
  string title = 2;
  string description = 3;
  int64 price = 4;
  string publication_date = 5;
  string ad_marking_responsible = 6;
  int64 responses_capacity = 7;
  NamedItem cooperation_type = 8;
  NamedItem topic = 9;
  NamedItem content_format = 10;
  BrandPreview brand = 11;
  repeated SocialNetworkItem social_networks = 12;
}

message FilterOffersRequest {
  repeated int64 cooperation_type_ids = 1;
  repeated int64 topic_ids = 2;
  repeated int64 social_network_ids = 3;
  repeated int64 content_format_ids = 4;
  repeated int64 brand_ids = 5;
  string query = 6;
  int64 price_from = 7;
  int64 price_to = 8;
  int64 page = 9;
  int64 limit = 10;
}

message FilterOffersResponse {
  repeated OfferItem offers = 1;
}

message FilterBrandsRequest {
  repeated int64 topic_ids = 1;
  repeated int64 social_network_ids = 2;
  string query = 3;
  int64 page = 4;
  int64 limit = 5;
}

message FilterBrandsResponse {
  repeated BrandItem brands = 1;
}

message GetBrandCardRequest {
  string brand_slug = 1;
}

message GetBrandCardResponse {
  BrandItem brand = 1;
}

message GetBrandOffersRequest {
  string brand_slug = 1;
}

message GetBrandOffersResponse {
  repeated OfferItem offers = 1;
}

message GetOfferCardRequest {
  string offer_id = 1;
}

message GetOfferCardResponse {
  OfferItem offer = 1;
}

message FilterCountItem {
  int64 id = 1;
  string name = 2;
  int64 offers_count = 3;
}

message GetFilterSettingsRequest {}

message GetFilterSettingsResponse {
  repeated FilterCountItem cooperation_types = 1;
  int64 all = 2;
}
